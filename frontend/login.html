<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Staff Login | BookMyToken</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #2A5C82;
            --accent-teal: #48B0AD;
            --bg-grey: #F8FAFC;
            --text-dark: #1E293B;
            --text-light: #64748B;
            --white: #FFFFFF;
            --border: #E2E8F0;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-grey);
            background-image: radial-gradient(circle at top right, #e2e8f0 0%, transparent 40%);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: var(--white);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .logo {
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-blue);
            margin-bottom: 5px;
        }

        .logo span { color: var(--accent-teal); }

        .subtitle {
            text-align: center;
            color: var(--text-light);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background-color: #FBFCFD;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            color: var(--text-dark);
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus { 
            border-color: var(--accent-teal);
            box-shadow: 0 0 0 4px rgba(72, 176, 173, 0.1);
            background-color: var(--white); 
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--accent-teal);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        .btn:hover { 
            background: #3b9491; 
            transform: translateY(-1px);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        #errorMessage {
            font-size: 0.85rem;
            text-align: center;
            margin-top: 15px;
            display: none;
            padding: 10px 14px;
            border-radius: 8px;
        }
        #errorMessage.auth-error {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.06);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        #errorMessage.access-denied {
            color: #b45309;
            background: rgba(245, 158, 11, 0.08);
            border: 1px solid rgba(245, 158, 11, 0.25);
        }
        .back-home {
            text-align: center;
            margin-top: 20px;
        }
        .back-home a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }
        .back-home a:hover { color: var(--accent-teal); }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo" style="cursor: default; user-select: none;">✚ BookMy<span style="color: var(--accent-teal);">Token</span></div>
        <div class="subtitle">Hospital Staff Login Portal</div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="staff@hospital.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn" id="loginBtn">Authenticate</button>
            <div id="errorMessage"></div>
        </form>
        <div class="back-home">
            <a href="/app/user.html">← Back to Home</a>
        </div>
    </div>

    <script>
        // Hidden Easter Egg: Triple click logo to access Super Admin portal
        let clickCount = 0;
        let clickTimer;
        document.querySelector('.logo').addEventListener('click', () => {
            clickCount++;
            clearTimeout(clickTimer);
            if (clickCount >= 3) {
                window.location.href = '/app/super_login.html';
            }
            clickTimer = setTimeout(() => { clickCount = 0; }, 1000);
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMessage');
            
            btn.textContent = 'Authenticating...';
            btn.disabled = true;
            errorMsg.style.display = 'none';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('https://hospital-platform.onrender.com/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                if (!response.ok) {
                    let errorText = 'Invalid email or password.';
                    try {
                        const errData = await response.json();
                        if (response.status === 403) {
                            errorMsg.className = 'access-denied';
                            errorText = '⛔ ' + (errData.detail || 'Access Denied. Your account or hospital has been deactivated.');
                        } else {
                            errorMsg.className = 'auth-error';
                            errorText = errData.detail || errorText;
                        }
                    } catch (_) {
                        errorMsg.className = 'auth-error';
                    }
                    errorMsg.textContent = errorText;
                    errorMsg.style.display = 'block';
                    btn.textContent = 'Authenticate';
                    btn.disabled = false;
                    return;
                }

                const data = await response.json();
                
                // Store token and redirect
                localStorage.setItem('hospital_token', data.access_token);
                localStorage.setItem('hospital_id', data.hospital_id);
                window.location.href = '/app/dashboard.html';

            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
            } finally {
                btn.textContent = 'Authenticate';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
